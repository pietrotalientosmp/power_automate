swagger: "2.0"
info:
  title: Newsletter Article Extractor
  description: Estrae, normalizza e punteggia articoli RSS per la newsletter settimanale.
  version: "1.0"
host: powerautomate-production.up.railway.app
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

paths:
  /extract-articles:
    post:
      summary: Estrai e normalizza articoli
      operationId: ExtractArticles
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ExtractRequest"
      responses:
        200:
          description: Articoli normalizzati e ordinati per score
          schema:
            $ref: "#/definitions/ExtractResponse"
        400:
          description: Input non valido

  /health:
    get:
      summary: Health check
      operationId: HealthCheck
      responses:
        200:
          description: Servizio attivo

definitions:
  RSSArticle:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      primaryLink:
        type: string
      links:
        type: array
        items:
          type: string
      publishDate:
        type: string
      updatedOn:
        type: string
      summary:
        type: string
      copyright:
        type: string
      categories:
        type: array
        items:
          type: string

  ExtractRequest:
    type: object
    required:
      - items
    properties:
      items:
        type: array
        description: Array di articoli RSS dal feed
        items:
          $ref: "#/definitions/RSSArticle"

  Article:
    type: object
    properties:
      title:
        type: string
      url:
        type: string
      summary:
        type: string
      publishDate:
        type: string
      categories:
        type: array
        items:
          type: string
      wordCount:
        type: integer
      score:
        type: number
        format: float

  ExtractResponse:
    type: object
    properties:
      articles:
        type: array
        items:
          $ref: "#/definitions/Article"
      count:
        type: integer
      processedAt:
        type: string